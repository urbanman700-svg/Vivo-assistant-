name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      - name: Flutter pub get
        run: cd vivo_assistant && flutter pub get
      - name: Build ARM64 APK
        run: cd vivo_assistant && flutter build apk --release --no-tree-shake-icons --target-platform android-arm64
        continue-on-error: true
      - name: Find and copy APK
        run: |
          mkdir -p output
          find /home/runner/work -name "*.apk" -type f 2>/dev/null
          find /home/runner/work -name "*.apk" -type f -exec cp {} output/ \; 2>/dev/null
          ls output/
      - uses: actions/upload-artifact@v4
        with:
          name: vivo-assistant-apk
          path: output/
          if-no-files-found: warn
