name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
      - run: cd vivo_assistant && flutter pub get
      - run: cd vivo_assistant && flutter build apk --release --no-tree-shake-icons
      - uses: actions/upload-artifact@v3
        with:
          name: vivo-assistant-apk
          path: vivo_assistant/build/app/outputs/flutter-apk/app-release.apk
