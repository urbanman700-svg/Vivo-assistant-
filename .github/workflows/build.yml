name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
      - name: Flutter pub get
        run: cd vivo_assistant && flutter pub get
      - name: Build APK via Gradle
        run: |
          cd vivo_assistant/android
          chmod +x gradlew
          ./gradlew assembleRelease
      - name: Find APK
        run: find . -name "*.apk" 2>/dev/null
      - uses: actions/upload-artifact@v4
        with:
          name: vivo-assistant-apk
          path: vivo_assistant/build/app/outputs/apk/release/app-release.apk
          if-no-files-found: warn
