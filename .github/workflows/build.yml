name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.9'
          channel: 'stable'
      - name: Flutter pub get
        run: cd vivo_assistant && flutter pub get
      - name: Build with Gradle directly
        run: |
          cd vivo_assistant/android
          ./gradlew assembleRelease \
            -Ptarget-platform=android-arm \
            -Pdart-obfuscation=false \
            -Ptrack-widget-creation=false \
            -Ptree-shake-icons=false
      - name: Find APK
        run: find . -name "*.apk" -type f
      - uses: actions/upload-artifact@v4
        with:
          name: vivo-assistant-apk
          path: vivo_assistant/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
