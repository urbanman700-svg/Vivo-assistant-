name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.9'
          channel: 'stable'
      - name: Flutter pub get
        run: cd vivo_assistant && flutter pub get
      - name: Build ARM32 APK
        run: cd vivo_assistant && flutter build apk --release --no-tree-shake-icons --target-platform android-arm
      - uses: actions/upload-artifact@v4
        with:
          name: vivo-assistant-apk
          path: vivo_assistant/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
